models:
  - name: dim_customers
    description: Customer dimension with geography(state).
    columns:
      - name: customer_sk
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
      - name: state
        tests:
          - not_null
  - name: dim_products
    columns:
      - name: product_sk
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
  - name: dim_sellers
    columns:
      - name: seller_sk
        tests:
          - unique
          - not_null
      - name: seller_id_nk
        tests:
          - not_null
  - name: dim_dates
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
      - name: date_day
        tests:
          - not_null
  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
        - relationships:
            to: ref('dim_customers')
            field: customer_unique_id
      - name: status
        tests:
          - accepted_values:
              values: ['delivered','shipped','canceled','unavailable','invoiced','processing','created','approved']
  - name: fct_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: item_sequence
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        tests:
          - relationships:
              to: ref('dim_sellers')
              field: seller_id_nk
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - item_sequence
  - name: fct_payments
    columns:
      - name: order_id
        tests:
          - not_null
      - name: sequential
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - sequential
  - name: fct_reviews
    columns:
      - name: review_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: score
        tests:
          - accepted_values:
              values: [1,2,3,4,5]
  - name: fct_sales
    columns:
      - name: order_id
        tests:
          - not_null
      - name: item_sequence
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: freight_value
        tests:
          - not_null
      - name: total_item_value
        tests:
          - not_null
      - name: delivery_status
        tests:
          - accepted_values:
              values: ['On Time', 'Late']
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - customer_id
            - order_id
            - item_sequence
