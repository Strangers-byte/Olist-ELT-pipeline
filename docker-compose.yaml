services:
    postgresDB:
        image: postgres:18
        restart: on-failure
        env_file:
            - .env
        ports:
            - "5432:5432"
        volumes:
            - ./db/init:/docker-entrypoint-initdb.d
            - pgdata:/var/lib/postgresql
        networks:
            - brazilecom_net

volumes:
    pgdata:

networks:
    brazilecom_net:
        external: true